# This file is included in the default server block
# Location blocks only - no server {} wrapper needed

# SPA routing: serve index.html for all routes
location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";
    add_header Expires "0";
}

# Proxy MCP server requests
location /api/mcp {
    proxy_pass https://aiobs-mcp-server-svc:8085/mcp;
    proxy_ssl_verify off;  # Skip SSL verification for internal services
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header Accept $http_accept;
    proxy_set_header Content-Type $content_type;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
    proxy_read_timeout 300s;
    proxy_connect_timeout 75s;
}

# Proxy MCP server config endpoint
location /api/config {
    proxy_pass https://aiobs-mcp-server-svc:8085/config;
    proxy_ssl_verify off;
    proxy_http_version 1.1;
    proxy_set_header Accept application/json;
}

# Proxy MCP server health check
location /api/health {
    proxy_pass https://aiobs-mcp-server-svc:8085/health;
    proxy_ssl_verify off;
    proxy_http_version 1.1;
    proxy_set_header Accept application/json;
}

# Cache static assets
location ~* \.(?:css|js)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
}

# Cache fonts and images
location ~* \.(?:jpg|jpeg|gif|png|ico|svg|woff|woff2|ttf|eot|otf)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
}

# Health check endpoint
location /health {
    access_log off;
    return 200 "healthy\n";
    add_header Content-Type text/plain;
}
