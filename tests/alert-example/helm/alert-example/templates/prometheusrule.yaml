{{- range .Values.apps }}
{{- if and .enabled .prometheusRule .prometheusRule.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ .name }}-rules
spec:
  groups:
  - name: {{ .name }}.rules
    rules:
    - alert: {{ .name | replace "-" "_" | title }}Down
      expr: |
        kube_deployment_status_replicas_unavailable{deployment="{{ .name }}"} > 0
      # Short duration for demo purposes - alert fires quickly after deployment becomes unavailable
      # This ensures deterministic behavior when demonstrating E2E observability integration
      for: 10s
      labels:
        severity: critical
      annotations:
        summary: "{{ .name }} deployment has unavailable replicas (app down)"
        description: "Deployment {{ .name }} has {{`{{ $value }}`}} unavailable replicas."
---
{{- end }}
{{- end }}


