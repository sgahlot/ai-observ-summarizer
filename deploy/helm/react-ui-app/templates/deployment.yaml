apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.app.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- toYaml .Values.labels | nindent 4 }}
spec:
  replicas: {{ .Values.app.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.app.name }}
  template:
    metadata:
      labels:
        {{- toYaml .Values.labels | nindent 8 }}
    spec:
      serviceAccountName: {{ include "react-ui-app.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}

      containers:
      {{- if .Values.oauth.enabled }}
      # OAuth Proxy sidecar for authentication
      - name: oauth-proxy
        image: "{{ .Values.oauth.image.repository }}:{{ .Values.oauth.image.tag }}"
        imagePullPolicy: {{ .Values.oauth.image.pullPolicy }}
        ports:
        - containerPort: {{ .Values.oauth.port }}
          name: https
          protocol: TCP
        args:
        - --https-address=:{{ .Values.oauth.port }}
        - --provider=openshift
        - --openshift-service-account={{ include "react-ui-app.serviceAccountName" . }}
        - --upstream=http://localhost:{{ .Values.app.port }}
        - --upstream-timeout={{ .Values.oauth.upstreamTimeout | default "240s" }}
        - --tls-cert=/etc/tls/private/tls.crt
        - --tls-key=/etc/tls/private/tls.key
        - --cookie-secret={{ .Values.oauth.cookieSecret | default (randAlphaNum 32 | b64enc) }}
        - --cookie-expire={{ .Values.oauth.cookieExpire }}
        - --skip-auth-regex=^/health
        volumeMounts:
        - name: proxy-tls
          mountPath: /etc/tls/private
        resources:
          requests:
            cpu: 10m
            memory: 20Mi
          limits:
            cpu: 50m
            memory: 50Mi
      {{- end }}

      # Main React UI application container
      - name: ui
        image: "{{ .Values.app.image.repository }}:{{ .Values.app.image.tag }}"
        imagePullPolicy: {{ .Values.app.image.pullPolicy }}
        ports:
        - containerPort: {{ .Values.app.port }}
          name: http
          protocol: TCP

        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3

        resources:
          {{- toYaml .Values.app.resources | nindent 10 }}

        env:
        - name: MCP_SERVER_URL
          value: "http://{{ .Values.mcpServer.serviceName }}.{{ default .Release.Namespace .Values.mcpServer.namespace }}.svc.cluster.local:{{ .Values.mcpServer.port }}/mcp"

      volumes:
      {{- if .Values.oauth.enabled }}
      - name: proxy-tls
        secret:
          secretName: {{ .Values.app.name }}-proxy-tls
      {{- end }}
