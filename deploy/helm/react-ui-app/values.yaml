# Application configuration
app:
  name: "aiobs-react-ui"
  replicas: 1
  image:
    repository: quay.io/ecosystem-appeng/aiobs-react-ui
    tag: 4.2.2
    pullPolicy: Always

  port: 8080

  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

# Service configuration
service:
  type: ClusterIP
  port: 8080
  targetPort: 8080

# Route configuration (OpenShift)
route:
  enabled: true
  host: ""  # Auto-generated if empty
  path: "/"
  timeout: "240s"  # HAProxy timeout for long-running AI analysis requests
  tls:
    enabled: true
    termination: edge
    insecureEdgeTerminationPolicy: Redirect

# OAuth Proxy (for authentication)
oauth:
  enabled: true
  image:
    repository: "quay.io/openshift/origin-oauth-proxy"
    tag: 4.22.0
    pullPolicy: IfNotPresent
  port: 8443
  upstreamTimeout: "240s"  # Timeout for upstream requests (AI analysis can take time)

  # Cookie configuration
  cookieSecret: ""  # Auto-generated if empty
  cookieExpire: "24h"

# MCP Server connection
mcpServer:
  serviceName: "aiobs-mcp-server-svc"
  port: 8085
  namespace: ""  # If empty, uses the release namespace

# Service Account
serviceAccount:
  create: true
  name: ""  # If empty, uses app.name
  annotations: {}  # OAuth redirect annotation is automatically added when oauth.enabled=true

# Security Context (OpenShift will automatically assign UID/GID from allowed range)
securityContext:
  runAsNonRoot: true

# Labels
labels:
  app: aiobs-react-ui
  component: react-ui
  part-of: openshift-ai-observability
