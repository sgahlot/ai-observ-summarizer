---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: view-thanos-{{ .Release.Namespace }}-mcp
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: view
subjects:
  - kind: ServiceAccount
    name: mcp-analyzer
    namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cluster-monitoring-view-thanos-{{ .Release.Namespace }}-mcp
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-monitoring-view
subjects:
  - kind: ServiceAccount
    name: mcp-analyzer
    namespace: {{ .Release.Namespace }}
---
{{- if .Values.rbac.bindOpenshiftClusterMonitoringView }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: openshift-cluster-monitoring-view-thanos-{{ .Release.Namespace }}-mcp
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: openshift-cluster-monitoring-view
subjects:
  - kind: ServiceAccount
    name: mcp-analyzer
    namespace: {{ .Release.Namespace }}
{{- end }}
---
{{- if .Values.rbac.createGrafanaRole }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: grafana-prometheus-reader
rules:
- apiGroups: ["*"]
  resources:
    - "prometheuses"
    - "prometheuses/*"
    - "alertmanagers"
    - "alertmanagers/*"
  verbs:
    - "get"
    - "list"
    - "watch"
- apiGroups: ["monitoring.coreos.com"]
  resources:
    - "prometheuses/api"
    - "alertmanagers/api"
  verbs:
    - "get"
    - "create"
    - "update"
{{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: grafana-prometheus-reader-binding-{{ .Release.Namespace }}-mcp
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: grafana-prometheus-reader
subjects:
  - kind: ServiceAccount
    name: mcp-analyzer
    namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: korrel8r-view-binding-{{ .Release.Namespace }}-mcp
subjects:
- kind: ServiceAccount
  name: mcp-analyzer
  namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: korrel8r-view
  apiGroup: rbac.authorization.k8s.io
---
# Bind to Loki tenant logs ClusterRole for multi-tenant access
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: loki-tenant-logs-binding-{{ .Release.Namespace }}-mcp
subjects:
- kind: ServiceAccount
  name: mcp-analyzer
  namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: openshift-logging-loki-stack-tenant-logs
  apiGroup: rbac.authorization.k8s.io
---
# ClusterRole for discovering InferenceServices (runtime model discovery)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: inferenceservice-viewer-{{ .Release.Namespace }}-mcp
  labels:
    app.kubernetes.io/name: mcp-server
    app.kubernetes.io/component: rbac
rules:
- apiGroups: ["serving.kserve.io"]
  resources: ["inferenceservices"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: inferenceservice-viewer-binding-{{ .Release.Namespace }}-mcp
subjects:
- kind: ServiceAccount
  name: mcp-analyzer
  namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: inferenceservice-viewer-{{ .Release.Namespace }}-mcp
  apiGroup: rbac.authorization.k8s.io

