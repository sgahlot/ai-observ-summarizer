{{/*
RBAC resources for namespace creation hook job.
This ServiceAccount needs permissions to check and create namespaces.
*/}}

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "aiobs-stack.fullname" . }}-namespace-hook
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aiobs-stack.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "aiobs-stack.fullname" . }}-namespace-hook
  labels:
    {{- include "aiobs-stack.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
rules:
- apiGroups: [""]
  resources: ["namespaces"]
  verbs: ["get", "list", "create", "patch", "update"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "aiobs-stack.fullname" . }}-namespace-hook
  labels:
    {{- include "aiobs-stack.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "aiobs-stack.fullname" . }}-namespace-hook
subjects:
- kind: ServiceAccount
  name: {{ include "aiobs-stack.fullname" . }}-namespace-hook
  namespace: {{ .Release.Namespace }}
