{{- if .Values.rbac.create }}
{{- if .Values.rbac.collector.create }}
{{/*
Collector Service Account and RBAC for OpenShift Logging.
This creates the necessary service account and permissions for log collection.

The collector ClusterRoles are provided by the cluster-logging operator bundle
(installed via OLM) and are NOT created here. Only the ServiceAccount and
ClusterRoleBindings are managed by this chart.
*/}}

{{/* ServiceAccount */}}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: collector
  namespace: openshift-logging
  labels:
    {{- include "loki-stack.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep

{{/* ClusterRoleBinding: collect-application-logs */}}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: collect-application-logs
  labels:
    {{- include "loki-stack.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: collect-application-logs
subjects:
- kind: ServiceAccount
  name: collector
  namespace: openshift-logging

{{/* ClusterRoleBinding: collect-infrastructure-logs */}}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: collect-infrastructure-logs
  labels:
    {{- include "loki-stack.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: collect-infrastructure-logs
subjects:
- kind: ServiceAccount
  name: collector
  namespace: openshift-logging

{{/* ClusterRoleBinding: collect-audit-logs */}}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: collect-audit-logs
  labels:
    {{- include "loki-stack.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: collect-audit-logs
subjects:
- kind: ServiceAccount
  name: collector
  namespace: openshift-logging

{{/* ClusterRoleBinding: logging-collector-logs-writer */}}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: logging-collector-logs-writer
  labels:
    {{- include "loki-stack.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: logging-collector-logs-writer
subjects:
- kind: ServiceAccount
  name: collector
  namespace: openshift-logging

{{- end }}{{/* end rbac.collector.create */}}
{{- end }}{{/* end rbac.create */}}
