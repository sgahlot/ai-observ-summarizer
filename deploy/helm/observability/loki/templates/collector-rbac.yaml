{{- if .Values.rbac.create }}
{{- if .Values.rbac.collector.create }}
{{/*
Collector Service Account and RBAC for OpenShift Logging.
This creates the necessary service account and permissions for log collection.

NOTE: Set rbac.collector.create=false if using OLM-managed Logging Operator,
as it will create these resources automatically.
*/}}

{{/* ServiceAccount */}}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: collector
  namespace: openshift-logging
  labels:
    {{- include "loki-stack.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep

{{/* ClusterRole: collect-application-logs */}}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: collect-application-logs
  labels:
    {{- include "loki-stack.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
rules:
- apiGroups:
  - logging.openshift.io
  - observability.openshift.io
  resourceNames:
  - application
  resources:
  - logs
  verbs:
  - collect

{{/* ClusterRole: collect-infrastructure-logs */}}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: collect-infrastructure-logs
  labels:
    {{- include "loki-stack.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
rules:
- apiGroups:
  - logging.openshift.io
  - observability.openshift.io
  resourceNames:
  - infrastructure
  resources:
  - logs
  verbs:
  - collect

{{/* ClusterRole: collect-audit-logs */}}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: collect-audit-logs
  labels:
    {{- include "loki-stack.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
rules:
- apiGroups:
  - logging.openshift.io
  - observability.openshift.io
  resourceNames:
  - audit
  resources:
  - logs
  verbs:
  - collect

{{/* ClusterRole: logging-collector-logs-writer */}}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: logging-collector-logs-writer
  labels:
    {{- include "loki-stack.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
rules:
- apiGroups: ["loki.grafana.com"]
  resources: ["application", "infrastructure", "audit"]
  verbs: ["create"]

{{/* ClusterRoleBinding: collect-application-logs */}}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: collect-application-logs
  labels:
    {{- include "loki-stack.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: collect-application-logs
subjects:
- kind: ServiceAccount
  name: collector
  namespace: openshift-logging

{{/* ClusterRoleBinding: collect-infrastructure-logs */}}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: collect-infrastructure-logs
  labels:
    {{- include "loki-stack.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: collect-infrastructure-logs
subjects:
- kind: ServiceAccount
  name: collector
  namespace: openshift-logging

{{/* ClusterRoleBinding: collect-audit-logs */}}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: collect-audit-logs
  labels:
    {{- include "loki-stack.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: collect-audit-logs
subjects:
- kind: ServiceAccount
  name: collector
  namespace: openshift-logging

{{/* ClusterRoleBinding: logging-collector-logs-writer */}}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: logging-collector-logs-writer
  labels:
    {{- include "loki-stack.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: logging-collector-logs-writer
subjects:
- kind: ServiceAccount
  name: collector
  namespace: openshift-logging

{{- end }}{{/* end rbac.collector.create */}}
{{- end }}{{/* end rbac.create */}}
