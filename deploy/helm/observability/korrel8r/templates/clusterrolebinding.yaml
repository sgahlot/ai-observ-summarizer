# ClusterRoleBindings for Korrel8r to access logs from LokiStack
# Korrel8r needs these permissions to correlate logs with metrics and traces

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "korrel8r.fullname" . }}-collect-application-logs
  labels:
    {{- include "korrel8r.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: collect-application-logs
subjects:
- kind: ServiceAccount
  name: {{ include "korrel8r.serviceAccountName" . }}
  namespace: {{ .Values.global.namespace }}

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "korrel8r.fullname" . }}-collect-infrastructure-logs
  labels:
    {{- include "korrel8r.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: collect-infrastructure-logs
subjects:
- kind: ServiceAccount
  name: {{ include "korrel8r.serviceAccountName" . }}
  namespace: {{ .Values.global.namespace }}

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "korrel8r.fullname" . }}-collect-audit-logs
  labels:
    {{- include "korrel8r.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: collect-audit-logs
subjects:
- kind: ServiceAccount
  name: {{ include "korrel8r.serviceAccountName" . }}
  namespace: {{ .Values.global.namespace }}

---
# ClusterRoleBinding for Loki tenant log access (application, infrastructure, audit)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "korrel8r.fullname" . }}-loki-tenant-logs
  labels:
    {{- include "korrel8r.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Values.loki.tenantClusterRoleName }}
subjects:
- kind: ServiceAccount
  name: {{ include "korrel8r.serviceAccountName" . }}
  namespace: {{ .Values.global.namespace }}