# Default values for llama-stack-instance.
# This chart creates a LlamaStackDistribution CR instead of a raw Deployment.
# The RHOAI LlamaStack operator reconciles the CR into the underlying resources.

replicas: 1
rawDeploymentMode: true

image:
  repository: llamastack/distribution-starter
  pullPolicy: IfNotPresent
  # Align with ai-architecture-charts llama-stack (distribution-starter); override if operator pins another version.
  tag: "0.6.0"

nameOverride: "llamastack"
fullnameOverride: "llamastack"

# Optional override when CR metadata.name / fullname and PVC name must stay aligned (default: llama-stack-data).
persistence:
  claimName: ""

service:
  port: 8321

env:
  - name: VLLM_MAX_TOKENS
    value: "4096"
  - name: VLLM_API_TOKEN
    value: fake
  - name: POSTGRES_USER
    valueFrom:
      secretKeyRef:
        key: user
        name: pgvector
  - name: POSTGRES_PASSWORD
    valueFrom:
      secretKeyRef:
        key: password
        name: pgvector
  - name: POSTGRES_HOST
    valueFrom:
      secretKeyRef:
        key: host
        name: pgvector
  - name: POSTGRES_PORT
    valueFrom:
      secretKeyRef:
        key: port
        name: pgvector
  - name: POSTGRES_DBNAME
    valueFrom:
      secretKeyRef:
        key: dbname
        name: pgvector

resources: {}

models:
  llama-3-2-3b-instruct:
    id: meta-llama/Llama-3.2-3B-Instruct
    enabled: false
  llama-guard-3-8b:
    id: meta-llama/Llama-Guard-3-8B
    enabled: false
    registerShield: true
  llama-3-2-1b-instruct:
    id: meta-llama/Llama-3.2-1B-Instruct
    enabled: false
  llama-3-1-8b-instruct:
    id: meta-llama/Llama-3.1-8B-Instruct
    enabled: false
  llama-guard-3-1b:
    id: meta-llama/Llama-Guard-3-1B
    enabled: false
    registerShield: true
  llama-3-3-70b-instruct:
    id: meta-llama/Llama-3.3-70B-Instruct
    enabled: false
  llama-3-2-1b-instruct-quantized:
    id: RedHatAI/Llama-3.2-1B-Instruct-quantized.w8a8
    enabled: false

# Metadata store configuration (distribution registry)
# By default uses SQLite (single replica only)
# For multi-replica deployments, override in parent values.yaml to use PostgreSQL
metadataStore:
  type: sqlite
  db_path: ${env.SQLITE_STORE_DIR:=~/.llama/distributions/starter}/registry.db

# Vector IO provider kvstore configuration
# By default uses SQLite (single replica only)
# For multi-replica deployments, override in parent values.yaml to use PostgreSQL
vectorIOKvstore:
  type: sqlite
  db_path: ${env.SQLITE_STORE_DIR:=~/.llama/distributions/starter}/pgvector_registry.db

providers:
  agents:
    - provider_id: meta-reference
      provider_type: inline::meta-reference
      config:
        persistence_store:
          type: sqlite
          namespace: null
          db_path: ${env.SQLITE_STORE_DIR:=~/.llama/distributions/starter}/agents_store.db
        responses_store:
          type: sqlite
          db_path: ${env.SQLITE_STORE_DIR:=~/.llama/distributions/starter}/responses_store.db

secrets: {}
mcp-servers: {}

vertexai:
  enabled: false

otelExporter: ""

auth: {}
