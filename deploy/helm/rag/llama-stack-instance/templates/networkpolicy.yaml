{{- /*
The LlamaStack operator creates a NetworkPolicy that restricts ingress to
the LlamaStack pod to only pods labelled app.kubernetes.io/part-of: llama-stack
and pods in the redhat-ods-applications namespace. This blocks legitimate
consumers in the same namespace (MCP server, alerting cronjob).

Kubernetes NetworkPolicies are additive — if ANY policy allows the traffic,
it is permitted. This policy allows all pods in the same namespace to reach
LlamaStack on port 8321, without modifying the operator-managed policy.
*/}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "llama-stack-instance.fullname" . }}-allow-namespace
  labels:
    {{- include "llama-stack-instance.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app: llama-stack
      app.kubernetes.io/instance: {{ include "llama-stack-instance.fullname" . }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
      ports:
        - port: {{ .Values.service.port }}
          protocol: TCP
