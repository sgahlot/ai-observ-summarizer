apiVersion: operators.coreos.com/v1alpha1
kind: ClusterServiceVersion
metadata:
  annotations:
    alm-examples: |-
      [
        {
          "apiVersion": "aiobs.rh-ai-quickstart.io/v1alpha1",
          "kind": "AIObservabilitySummarizer",
          "metadata": {
            "labels": {
              "app.kubernetes.io/created-by": "aiobs-operator",
              "app.kubernetes.io/instance": "cluster-ai-observability",
              "app.kubernetes.io/managed-by": "kustomize",
              "app.kubernetes.io/name": "aiobservabilitysummarizer",
              "app.kubernetes.io/part-of": "aiobs-operator"
            },
            "name": "cluster-ai-observability",
            "namespace": "ai-observability"
          },
          "spec": {
            "alerting": {
              "enabled": false
            },
            "consolePlugin": {
              "enabled": true
            },
            "global": {
              "devMode": false
            },
            "loki": {
              "lokiStack": {
                "storageClassName": "auto"
              }
            },
            "mcpServer": {
              "enabled": true
            },
            "rag": {
              "enabled": true,
              "global": {
                "models": {
                  "llama-3-1-8b-instruct": {
                    "enabled": true
                  }
                }
              },
              "llm-service": {
                "device": "gpu",
                "secret": {
                  "hf_token": ""
                }
              }
            }
          }
        }
      ]
    capabilities: Basic Install
    categories: AI/Machine Learning, Monitoring
    containerImage: quay.io/ecosystem-appeng/aiobs-operator:v1.2.5-operator
    createdAt: "2024-12-08T00:00:00Z"
    description: Deploy AI-powered observability summarization for OpenShift
    repository: https://github.com/rh-ai-quickstart/openshift-ai-observability-summarizer
    support: Community
  name: aiobs-operator.v1.2.5-operator
  namespace: placeholder
spec:
  apiservicedefinitions: {}
  customresourcedefinitions:
    owned:
    - description: Deploys the AI Observability Summarizer stack
      displayName: AI Observability Summarizer
      kind: AIObservabilitySummarizer
      name: aiobservabilitysummarizers.aiobs.rh-ai-quickstart.io
      specDescriptors:
      - description: Enable or disable the RAG stack (LLM deployment). When disabled,
          model selection and HuggingFace token are not required.
        displayName: Enable RAG Stack
        path: rag.enabled
        x-descriptors:
        - urn:alm:descriptor:com.tectonic.ui:fieldGroup:LLM Configuration
        - urn:alm:descriptor:com.tectonic.ui:booleanSwitch
      - description: 'REQUIRED (if RAG enabled): Your HuggingFace API token for downloading
          LLM models. Get one at https://huggingface.co/settings/tokens'
        displayName: HuggingFace Token
        path: rag.llm-service.secret.hf_token
        x-descriptors:
        - urn:alm:descriptor:com.tectonic.ui:fieldGroup:LLM Configuration
        - urn:alm:descriptor:com.tectonic.ui:password
      - description: Hardware type for LLM deployment
        displayName: Device Type
        path: rag.llm-service.device
        x-descriptors:
        - urn:alm:descriptor:com.tectonic.ui:fieldGroup:LLM Configuration
        - urn:alm:descriptor:com.tectonic.ui:select:gpu
        - urn:alm:descriptor:com.tectonic.ui:select:hpu
        - urn:alm:descriptor:com.tectonic.ui:select:gpu-amd
        - urn:alm:descriptor:com.tectonic.ui:select:cpu
      - description: RECOMMENDED - Good balance of performance and resource usage
          (16GB GPU). Enabled by default.
        displayName: Llama 3.1 8B Instruct (Recommended)
        path: rag.global.models.llama-3-1-8b-instruct.enabled
        x-descriptors:
        - urn:alm:descriptor:com.tectonic.ui:fieldGroup:Model Selection
        - urn:alm:descriptor:com.tectonic.ui:booleanSwitch
      - description: Smallest model, fastest inference (2GB GPU)
        displayName: Llama 3.2 1B Instruct
        path: rag.global.models.llama-3-2-1b-instruct.enabled
        x-descriptors:
        - urn:alm:descriptor:com.tectonic.ui:fieldGroup:More Models
        - urn:alm:descriptor:com.tectonic.ui:booleanSwitch
        - urn:alm:descriptor:com.tectonic.ui:advanced
      - description: Small model, good for limited GPU memory (6GB GPU)
        displayName: Llama 3.2 3B Instruct
        path: rag.global.models.llama-3-2-3b-instruct.enabled
        x-descriptors:
        - urn:alm:descriptor:com.tectonic.ui:fieldGroup:More Models
        - urn:alm:descriptor:com.tectonic.ui:booleanSwitch
        - urn:alm:descriptor:com.tectonic.ui:advanced
      - description: Largest model, best quality but requires 4 GPUs (140GB+ VRAM)
        displayName: Llama 3.3 70B Instruct
        path: rag.global.models.llama-3-3-70b-instruct.enabled
        x-descriptors:
        - urn:alm:descriptor:com.tectonic.ui:fieldGroup:More Models
        - urn:alm:descriptor:com.tectonic.ui:booleanSwitch
        - urn:alm:descriptor:com.tectonic.ui:advanced
      - description: Quantized 1B model for optimized inference (lower memory usage)
        displayName: Llama 3.2 1B Quantized (w8a8)
        path: rag.global.models.llama-3-2-1b-instruct-quantized.enabled
        x-descriptors:
        - urn:alm:descriptor:com.tectonic.ui:fieldGroup:More Models
        - urn:alm:descriptor:com.tectonic.ui:booleanSwitch
        - urn:alm:descriptor:com.tectonic.ui:advanced
      - description: Small safety model for content moderation (2GB GPU)
        displayName: Llama Guard 3 1B (Safety)
        path: rag.global.models.llama-guard-3-1b.enabled
        x-descriptors:
        - urn:alm:descriptor:com.tectonic.ui:fieldGroup:More Models
        - urn:alm:descriptor:com.tectonic.ui:booleanSwitch
        - urn:alm:descriptor:com.tectonic.ui:advanced
      - description: Larger safety model for better content moderation (16GB GPU)
        displayName: Llama Guard 3 8B (Safety)
        path: rag.global.models.llama-guard-3-8b.enabled
        x-descriptors:
        - urn:alm:descriptor:com.tectonic.ui:fieldGroup:More Models
        - urn:alm:descriptor:com.tectonic.ui:booleanSwitch
        - urn:alm:descriptor:com.tectonic.ui:advanced
      - description: Runs a CronJob to analyze and summarize alerts using the LLM
        displayName: Enable Alert Analysis
        path: alerting.enabled
        x-descriptors:
        - urn:alm:descriptor:com.tectonic.ui:fieldGroup:Other Settings
        - urn:alm:descriptor:com.tectonic.ui:booleanSwitch
      - description: Enable development mode for testing with browser-cached API keys
          (sessionStorage). Use only for development/testing environments.
        displayName: Development Mode
        path: global.devMode
        x-descriptors:
        - urn:alm:descriptor:com.tectonic.ui:fieldGroup:Other Settings
        - urn:alm:descriptor:com.tectonic.ui:booleanSwitch
      statusDescriptors:
      - description: Current status conditions
        displayName: Conditions
        path: conditions
        x-descriptors:
        - urn:alm:descriptor:io.kubernetes.conditions
      version: v1alpha1
  description: "## AI Observability Summarizer Operator\n\nThe AI Observability Summarizer
    Operator provides an easy way to deploy an AI-powered \nobservability stack on
    OpenShift. It leverages LLMs to analyze and summarize metrics, \nlogs, and traces
    from your cluster.\n\n### Recommended Namespace\n\nInstall this operator and create
    the CR in the **`ai-observability`** namespace.\n\n### Always Installed\n\n- **MCP
    Server**: Model Context Protocol server for AI-driven observability queries\n-
    **OpenShift Console Plugin**: Native integration with OpenShift Console\n\n###
    Optional Features\n\n- **Alerting**: Enable automated alert analysis and summarization\n-
    **RAG Stack**: Deploy LLM infrastructure (requires GPU resources)\n- **Shared
    Infrastructure**: Deploy Tempo, OTEL Collector, Korrel8r, MinIO (disable if already
    installed)\n\n### Quick Start\n\n1. Create namespace: `oc new-project ai-observability`\n2.
    Install the operator from OperatorHub into `ai-observability`\n3. Go to **Installed
    Operators** → **AI Observability Summarizer**\n4. Click **Create AIObservabilitySummarizer**\n5.
    Toggle optional features as needed\n6. Click **Create**\n\n### Prerequisites\n\n-
    OpenShift 4.12+\n- Cluster admin access\n- For RAG: GPU nodes available\n"
  displayName: AI Observability Summarizer
  icon:
  - base64data: 
    mediatype: image/png
  install:
    spec:
      deployments: null
    strategy: ""
  installModes:
  - supported: true
    type: OwnNamespace
  - supported: true
    type: SingleNamespace
  - supported: false
    type: MultiNamespace
  - supported: true
    type: AllNamespaces
  keywords:
  - ai
  - observability
  - monitoring
  - llm
  - openshift
  - prometheus
  - tempo
  - loki
  - rag
  - gpu
  links:
  - name: Documentation
    url: https://github.com/rh-ai-quickstart/openshift-ai-observability-summarizer
  - name: Source Code
    url: https://github.com/rh-ai-quickstart/openshift-ai-observability-summarizer
  maintainers:
  - email: aiobs-team@example.com
    name: AI Observability Team
  maturity: alpha
  minKubeVersion: 1.25.0
  provider:
    name: RH AI Quickstart
    url: https://github.com/rh-ai-quickstart
  relatedImages:
  - image: quay.io/ecosystem-appeng/aiobs-operator:v1.0.14-feature
    name: operator
  version: 0.0.1
